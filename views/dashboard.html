<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Survey dashboard</title>
    <link rel="stylesheet" href="/theme.css" />
    <style>
      .page {
        max-width: 1040px;
        margin: 0 auto;
        padding: 28px 22px 64px;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 8px;
        flex-wrap: wrap;
      }
      .topbar h1 {
        margin: 0;
        font-size: 1.6rem;
        letter-spacing: -0.02em;
      }
      .topbar .sub {
        color: var(--ink-soft);
        margin: 2px 0 0;
        font-size: 0.95rem;
      }
      .actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      .actions .btn {
        padding: 12px 22px;
        font-size: 1rem;
      }
      .btn-danger {
        background: var(--danger);
      }
      .stat-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 16px;
        margin: 22px 0;
      }
      .stat {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 20px;
      }
      .stat .num {
        font-size: 2.2rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .stat .cap {
        color: var(--ink-soft);
        font-size: 0.9rem;
        margin-top: 2px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 16px;
      }
      .panel {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 22px;
      }
      .panel h2 {
        margin: 0 0 16px;
        font-size: 1.1rem;
      }
      .bar {
        margin-bottom: 14px;
      }
      .bar:last-child {
        margin-bottom: 0;
      }
      .bar .bl {
        display: flex;
        justify-content: space-between;
        font-size: 0.95rem;
        margin-bottom: 6px;
      }
      .bar .bl .v {
        color: var(--ink-soft);
      }
      .track {
        height: 14px;
        background: var(--bg-2);
        border-radius: 999px;
        overflow: hidden;
      }
      .fill {
        height: 100%;
        background: var(--accent);
        border-radius: 999px;
        transition: width 0.5s ease;
        min-width: 2px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.95rem;
      }
      .table-wrap {
        overflow-x: auto;
        margin-top: 16px;
      }
      th,
      td {
        text-align: left;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        white-space: nowrap;
      }
      th {
        color: var(--ink-soft);
        font-weight: 600;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      tbody tr:hover {
        background: #faf8f3;
      }
      .pill {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 600;
        font-size: 0.85rem;
      }
      .empty {
        text-align: center;
        color: var(--ink-soft);
        padding: 60px 20px;
      }
      .section-title {
        margin: 30px 0 14px;
        font-size: 1.1rem;
      }
      .xtab td.cell {
        text-align: center;
        font-variant-numeric: tabular-nums;
      }
      .xtab .heat {
        border-radius: 8px;
        padding: 10px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="topbar">
        <div>
          <h1 id="title">Survey dashboard</h1>
          <p class="sub" id="sub"></p>
        </div>
        <div class="actions">
          <a class="btn-ghost" href="/">← Survey</a>
          <button class="btn btn-danger" id="reset">Reset to 0</button>
          <a class="btn" href="/api/export.csv">Export CSV</a>
        </div>
      </div>

      <div id="content"></div>
    </div>

    <script>
      const pct = (n, total) => (total ? Math.round((n / total) * 100) : 0);

      function bar(label, value, total) {
        return `
        <div class="bar">
          <div class="bl"><span>${label}</span>
            <span class="v">${value} · ${pct(value, total)}%</span></div>
          <div class="track"><div class="fill" style="width:${pct(
            value,
            total
          )}%"></div></div>
        </div>`;
      }

      function counts(responses, question) {
        const map = Object.fromEntries(question.options.map((o) => [o.value, 0]));
        for (const r of responses) {
          const v = r.answers[question.id];
          if (v in map) map[v] += 1;
        }
        return map;
      }

      function crossTab(responses, survey) {
        const [a, b] = survey.questions; // size (rows) x price (cols)
        const grid = {};
        let max = 0;
        for (const ra of a.options) {
          grid[ra.value] = {};
          for (const rb of b.options) grid[ra.value][rb.value] = 0;
        }
        for (const r of responses) {
          const av = r.answers[a.id];
          const bv = r.answers[b.id];
          if (grid[av] && bv in grid[av]) {
            grid[av][bv] += 1;
            max = Math.max(max, grid[av][bv]);
          }
        }
        const head = b.options
          .map((o) => `<th>${o.label}</th>`)
          .join('');
        const rows = a.options
          .map((ra) => {
            const cells = b.options
              .map((rb) => {
                const v = grid[ra.value][rb.value];
                const intensity = max ? v / max : 0;
                const bg =
                  v === 0
                    ? 'transparent'
                    : `rgba(15,118,110,${0.12 + intensity * 0.55})`;
                const col = intensity > 0.6 ? '#fff' : 'var(--ink)';
                return `<td class="cell"><span class="heat" style="background:${bg};color:${col}">${v}</span></td>`;
              })
              .join('');
            return `<tr><th>${ra.label}</th>${cells}</tr>`;
          })
          .join('');
        return `
        <table class="xtab">
          <thead><tr><th></th>${head}</tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
      }

      function fmtDate(iso) {
        return new Date(iso).toLocaleString();
      }

      function labelFor(question, value) {
        const o = question.options.find((x) => x.value === value);
        return o ? o.label : value;
      }

      function render({ survey, responses }) {
        document.getElementById('title').textContent =
          survey.title + ' · dashboard';
        const total = responses.length;
        const last = total ? fmtDate(responses[responses.length - 1].createdAt) : '—';
        document.getElementById('sub').textContent =
          total + ' response' + (total === 1 ? '' : 's') +
          (total ? ' · last at ' + last : '');

        const content = document.getElementById('content');

        if (!total) {
          content.innerHTML =
            '<div class="panel empty">No responses yet.<br>Open the survey on the iPad and submit one to see it here.</div>';
          return;
        }

        const stats = `
          <div class="stat-row">
            <div class="stat"><div class="num">${total}</div><div class="cap">Total responses</div></div>
            ${survey.questions
              .map((q) => {
                const c = counts(responses, q);
                const top = Object.entries(c).sort((a, b) => b[1] - a[1])[0];
                return `<div class="stat"><div class="num">${labelFor(
                  q,
                  top[0]
                )}</div><div class="cap">Most chosen · ${q.label.replace(
                  /\?$/,
                  ''
                )}</div></div>`;
              })
              .join('')}
          </div>`;

        const panels = `
          <div class="grid">
            ${survey.questions
              .map((q) => {
                const c = counts(responses, q);
                return `<div class="panel"><h2>${q.label}</h2>${q.options
                  .map((o) => bar(o.label, c[o.value], total))
                  .join('')}</div>`;
              })
              .join('')}
          </div>`;

        const xtab = `
          <h2 class="section-title">Size × price breakdown</h2>
          <div class="panel">${crossTab(responses, survey)}</div>`;

        const rows = responses
          .slice()
          .reverse()
          .map(
            (r) => `
            <tr>
              <td>${fmtDate(r.createdAt)}</td>
              ${survey.questions
                .map(
                  (q) =>
                    `<td><span class="pill">${labelFor(
                      q,
                      r.answers[q.id]
                    )}</span></td>`
                )
                .join('')}
            </tr>`
          )
          .join('');

        const table = `
          <h2 class="section-title">All responses</h2>
          <div class="panel" style="padding:6px">
            <div class="table-wrap">
              <table>
                <thead><tr><th>When</th>${survey.questions
                  .map((q) => `<th>${q.label.replace(/\?$/, '')}</th>`)
                  .join('')}</tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          </div>`;

        content.innerHTML = stats + panels + xtab + table;
      }

      function load() {
        fetch('/api/responses')
          .then((r) => r.json())
          .then(render)
          .catch(() => {});
      }

      document.getElementById('reset').addEventListener('click', async () => {
        if (
          !confirm(
            'Delete ALL responses and reset the count to 0? This cannot be undone.'
          )
        )
          return;
        await fetch('/api/reset', { method: 'POST' });
        load();
      });

      load();
    </script>
  </body>
</html>
