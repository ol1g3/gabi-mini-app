<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Survey</title>
    <link rel="stylesheet" href="/theme.css" />
    <link rel="stylesheet" href="/kiosk.css" />
  </head>
  <body>
    <main class="kiosk">
      <!-- Survey screen -->
      <section id="survey" class="screen">
        <header class="kiosk-head">
          <h1 id="title"></h1>
          <p id="subtitle"></p>
        </header>
        <div id="questions"></div>
        <footer class="kiosk-foot">
          <button id="submit" class="btn" disabled>Submit</button>
        </footer>
      </section>
    </main>

    <!-- Brief confirmation after submit -->
    <div id="toast" class="toast hidden">Thank you! Saved ✓</div>

    <!-- Dashboard link -->
    <a class="dash-link" href="/dashboard">View dashboard</a>

    <script src="/kiosk.js"></script>
  </body>
</html>
