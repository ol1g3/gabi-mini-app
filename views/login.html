<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard login</title>
    <link rel="stylesheet" href="/theme.css" />
    <style>
      .wrap {
        min-height: 100vh;
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 380px;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow-lg);
        padding: 36px 30px;
        text-align: center;
      }
      .card h1 {
        margin: 0 0 6px;
        font-size: 1.5rem;
      }
      .card p {
        margin: 0 0 24px;
        color: var(--ink-soft);
      }
      .lock {
        width: 48px;
        height: 48px;
        margin: 0 auto 14px;
        border-radius: 50%;
        background: var(--accent-soft);
        color: var(--accent);
        display: grid;
        place-items: center;
        font-size: 1.4rem;
      }
      input[type='password'] {
        width: 100%;
        padding: 16px;
        font-size: 1.05rem;
        border: 2px solid var(--line);
        border-radius: 14px;
        margin-bottom: 14px;
        background: #fff;
        color: var(--ink);
      }
      input[type='password']:focus {
        outline: none;
        border-color: var(--accent);
      }
      .btn {
        width: 100%;
      }
      .error {
        color: var(--danger);
        font-size: 0.95rem;
        margin-bottom: 12px;
        min-height: 1.2em;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <form class="card" method="POST" action="/login">
        <div class="lock">🔒</div>
        <h1>Dashboard</h1>
        <p>Enter the password to view responses.</p>
        <div class="error" id="error"></div>
        <input
          type="password"
          name="password"
          placeholder="Password"
          autofocus
          autocomplete="current-password"
        />
        <button class="btn" type="submit">Unlock</button>
      </form>
    </div>
    <script>
      if (new URLSearchParams(location.search).has('error')) {
        document.getElementById('error').textContent = 'Incorrect password.';
      }
    </script>
  </body>
</html>
